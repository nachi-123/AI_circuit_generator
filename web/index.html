<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Circuit Assistant</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="header">
        <h1>AI Circuit Assistant</h1>
      </header>

      <section id="messages" class="messages" aria-live="polite"></section>

      <form id="composer" class="composer" autocomplete="off">
        <input
          id="input"
          class="input"
          type="text"
          placeholder="Describe a circuit (e.g., priority encoder D3=0 D2=0 D1=0 D0=1)"
          required
        />
        <button id="send" class="send" type="submit">Send</button>
      </form>
    </main>

    <div id="modal" class="modal" aria-hidden="true">
      <div class="modal-backdrop" data-close="true"></div>
      <div class="modal-dialog">
        <button
          class="modal-close"
          type="button"
          aria-label="Close"
          data-close="true"
        >
          ×
        </button>
        <img id="modal-img" alt="Circuit diagram" />
        <div class="modal-actions">
          <a id="modal-download" class="btn btn-primary" download="circuit.svg"
            >Download SVG</a
          >
          <a id="modal-open-new" class="btn" target="_blank" rel="noreferrer"
            >Open in new tab</a
          >
        </div>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
